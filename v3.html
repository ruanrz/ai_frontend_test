<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RampingUp — Employee Portal (Neon)</title>
  <link rel="stylesheet" href="v3.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__logo">
          <svg width="32" height="32" viewBox="80 46 82 82" fill="none">
            <rect x="80" y="46" width="82" height="82" rx="10" fill="#1a1a1a"/>
            <path d="M110.39,71.82c.85,0,1.42.88,1.06,1.66l-4.55,9.9-.06.13-.67,1.46-6.4,13.93c-.19.42-.61.68-1.06.68h-10.58c-.85,0-1.42-.88-1.06-1.66l5.95-12.96.67-1.46,5.06-11.01c.19-.41.61-.68,1.06-.68h10.58Z" fill="#fff"/>
            <path d="M151.2,83.51h-10.58c-.46,0-.87-.27-1.06-.68l-4.3-9.35c-.36-.77.21-1.66,1.06-1.66h10.58c.46,0,.87.27,1.06.68l4.3,9.35c.36.77-.21,1.66-1.06,1.66Z" fill="#47fa22"/>
            <path d="M126.07,73.48l-4.3,9.35c-.19.41-.61.68-1.06.68h-10.58c-.85,0-1.42-.88-1.06-1.66l4.3-9.35c.19-.41.61-.68,1.06-.68h10.58c.85,0,1.42.88,1.06,1.66Z" fill="#fff"/>
            <path d="M125.69,99.59h-10.59c-.46,0-.87-.27-1.06-.68l-5.64-12.28c-.36-.77.21-1.66,1.06-1.66h10.59c.46,0,.87.27,1.06.68l5.64,12.28c.36.77-.21,1.66-1.06,1.66Z" fill="#fff"/>
            <path d="M152.93,86.63l-5.64,12.28c-.19.42-.61.68-1.06.68h-10.58c-.85,0-1.42-.88-1.06-1.66l5.64-12.28c.19-.42.61-.68,1.06-.68h10.58c.85,0,1.42.88,1.06,1.66Z" fill="#47fa22"/>
          </svg>
        </div>
        <span class="sidebar__title">RampingUp</span>
      </div>

      <nav class="sidebar__nav" id="sidebarNav">
        <a href="#/" class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>

        <div class="nav-divider"></div>
        <div class="nav-section-label">Work</div>
        <a href="#/leave" class="nav-item" data-page="leave">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span>Leave</span>
        </a>
        <a href="#/salary" class="nav-item" data-page="salary">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          <span>Salary</span>
        </a>
        <a href="#/expenses" class="nav-item" data-page="expenses">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 4H3v16h18V4z"/><path d="M21 10H3M7 15h4"/></svg>
          <span>Expenses</span>
        </a>
        <a href="#/tickets" class="nav-item" data-page="tickets">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 5H9l-1 8h8l-1-8zM9 5L7.6 2h8.8L15 5"/><path d="M8 13v4a3 3 0 003 3h2a3 3 0 003-3v-4"/></svg>
          <span>Tickets</span>
        </a>

        <div class="nav-divider"></div>
        <div class="nav-section-label">Finance</div>
        <a href="#/contract" class="nav-item" data-page="contract">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>
          <span>Contract</span>
        </a>
        <a href="#/wallet" class="nav-item" data-page="wallet">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 12a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/><path d="M2 10h20"/></svg>
          <span>Wallet</span>
        </a>

        <div class="nav-divider"></div>
        <div class="nav-section-label">Account</div>
        <a href="#/profile" class="nav-item" data-page="profile">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
          <span>Profile</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="avatar avatar--sm"><span>ZR</span></div>
          <div class="sidebar__user-info">
            <span class="sidebar__user-name">Zhang Rui</span>
            <span class="sidebar__user-role">Software Engineer</span>
          </div>
        </div>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <button class="topbar__toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="topbar__breadcrumb" id="breadcrumb">Dashboard</div>
        <div class="topbar__actions">
          <button class="topbar__btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="topbar__badge">3</span>
          </button>
          <div class="avatar avatar--topbar"><span>ZR</span></div>
        </div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
