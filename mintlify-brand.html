<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RampingUp — Employee Portal (Mintlify Brand)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════════════════════════
   MINTLIFY EDITION — Complete Design System
   ═══════════════════════════════════════════════════════════════ */

/* ── Reset & Base ──────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --primary: #0d0d0d;
  --secondary: #555;
  --muted: #999;
  --green: #47FA22;
  --green-soft: rgba(71, 250, 34, 0.08);
  --green-hover: #3bd416;
  --bg: #fff;
  --bg-page: #fafafa;
  --border: rgba(0,0,0,0.05);
  --border-strong: rgba(0,0,0,0.1);
  --shadow-whisper: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-modal: 0 16px 48px rgba(0,0,0,0.12);
  --radius: 8px;
  --radius-lg: 12px;
  --radius-pill: 9999px;
  --sidebar-w: 260px;
  --topbar-h: 0px;
  --transition: 0.2s ease;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  color: var(--primary);
  background: var(--bg-page);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: inherit; font-size: inherit; }

/* ── Layout Shell ──────────────────────────────────────────── */
.app {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform 0.3s ease;
  overflow: hidden;
}

.sidebar.collapsed {
  transform: translateX(calc(-1 * var(--sidebar-w)));
}

.sidebar__brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar__logo svg { display: block; }

.sidebar__title {
  font-size: 15px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: -0.01em;
}

.sidebar__search {
  padding: 12px 16px;
}

.sidebar__search-input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--primary);
  background: var(--bg-page);
  outline: none;
  transition: border-color var(--transition);
}

.sidebar__search-input:focus {
  border-color: var(--green);
}

.sidebar__search-wrap {
  position: relative;
}

.sidebar__search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

.sidebar__nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.sidebar__nav::-webkit-scrollbar { width: 4px; }
.sidebar__nav::-webkit-scrollbar-track { background: transparent; }
.sidebar__nav::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

/* Nav section groups */
.nav-group { margin-bottom: 4px; }

.nav-group__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
  border-radius: 0;
}

.nav-group__header:hover { background: var(--bg-page); }

.nav-group__label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}

.nav-group__chevron {
  width: 14px;
  height: 14px;
  color: var(--muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}

.nav-group.collapsed .nav-group__chevron {
  transform: rotate(-90deg);
}

.nav-group__items {
  overflow: hidden;
  transition: max-height 0.25s ease;
  max-height: 500px;
}

.nav-group.collapsed .nav-group__items {
  max-height: 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 20px 7px 24px;
  font-size: 13px;
  font-weight: 400;
  color: var(--secondary);
  border-left: 2px solid transparent;
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
}

.nav-item:hover {
  color: var(--primary);
  background: var(--bg-page);
}

.nav-item.active {
  color: var(--green);
  font-weight: 500;
  border-left-color: var(--green);
  background: var(--green-soft);
}

.nav-item__icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  opacity: 0.6;
}

.nav-item.active .nav-item__icon { opacity: 1; }

/* Sidebar footer */
.sidebar__footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.sidebar__user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-pill);
  background: var(--green-soft);
  color: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}

.sidebar__user-info {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.sidebar__user-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar__user-role {
  font-size: 11px;
  color: var(--muted);
}

/* ── Main Area ─────────────────────────────────────────────── */
.main-area {
  flex: 1;
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  transition: margin-left 0.3s ease;
  display: flex;
  flex-direction: column;
}

.main-area.expanded {
  margin-left: 0;
}

/* ── Mobile Toggle ─────────────────────────────────────────── */
.sidebar-toggle {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  width: 36px;
  height: 36px;
  border-radius: var(--radius);
  background: var(--bg);
  border: 1px solid var(--border);
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-card);
  color: var(--primary);
}

/* ── Content ───────────────────────────────────────────────── */
.content {
  flex: 1;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  padding: 40px 48px 80px;
}

/* ── Breadcrumb ────────────────────────────────────────────── */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.breadcrumb__sep { color: rgba(0,0,0,0.2); }

.breadcrumb a {
  color: var(--muted);
  transition: color var(--transition);
}

.breadcrumb a:hover { color: var(--primary); }

.breadcrumb__current { color: var(--secondary); }

/* ── Page Header ───────────────────────────────────────────── */
.page-header {
  margin-bottom: 32px;
}

.page-header__title {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--primary);
  line-height: 1.2;
  margin-bottom: 6px;
}

.page-header__desc {
  font-size: 14px;
  color: var(--secondary);
  line-height: 1.5;
}

.page-header__actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-pill);
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--green);
  color: #000;
  border: none;
}

.btn-primary:hover { background: var(--green-hover); }

.btn-secondary {
  background: var(--bg);
  color: var(--primary);
  border: 1px solid var(--border-strong);
}

.btn-secondary:hover { background: var(--bg-page); border-color: rgba(0,0,0,0.15); }

.btn-ghost {
  background: transparent;
  color: var(--secondary);
  padding: 6px 12px;
}

.btn-ghost:hover { color: var(--primary); background: var(--bg-page); }

.btn-sm { padding: 5px 12px; font-size: 12px; }

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--secondary);
  transition: all var(--transition);
}

.btn-icon:hover { background: var(--bg-page); color: var(--primary); }

/* ── Cards ─────────────────────────────────────────────────── */
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-whisper);
  transition: box-shadow var(--transition);
}

.card:hover { box-shadow: var(--shadow-card); }

.card--accent {
  border-left: 3px solid var(--green);
}

.card__header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card__title {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
}

.card__body { padding: 20px; }

/* ── Badges ────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 500;
  border-radius: var(--radius-pill);
  white-space: nowrap;
}

.badge-green { background: rgba(24,226,153,0.12); color: #0d9668; }
.badge-amber { background: rgba(245,158,11,0.12); color: #b45309; }
.badge-red { background: rgba(220,38,38,0.12); color: #dc2626; }
.badge-gray { background: rgba(0,0,0,0.05); color: var(--secondary); }
.badge-blue { background: rgba(59,130,246,0.12); color: #2563eb; }
.badge-purple { background: rgba(139,92,246,0.12); color: #7c3aed; }

/* ── Info Blocks (Dashboard) ───────────────────────────────── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.info-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-whisper);
  transition: all var(--transition);
}

.info-block:hover {
  box-shadow: var(--shadow-card);
  transform: translateY(-1px);
}

.info-block__label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 6px;
}

.info-block__value {
  font-size: 24px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: -0.02em;
}

.info-block__sub {
  font-size: 12px;
  color: var(--secondary);
  margin-top: 4px;
}

/* ── Welcome Block ─────────────────────────────────────────── */
.welcome-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 32px;
  box-shadow: var(--shadow-whisper);
  position: relative;
  overflow: hidden;
}

.welcome-block::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 200px;
  height: 100%;
  background: linear-gradient(135deg, transparent 40%, var(--green-soft));
  pointer-events: none;
}

.welcome-block__greeting {
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--green);
  margin-bottom: 6px;
}

.welcome-block__title {
  font-size: 22px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.welcome-block__desc {
  font-size: 14px;
  color: var(--secondary);
  line-height: 1.6;
  max-width: 520px;
}

/* Quick links */
.quick-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 20px;
}

.quick-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--secondary);
  background: var(--bg-page);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  transition: all var(--transition);
  cursor: pointer;
}

.quick-link:hover {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-soft);
}

/* ── Activity List ─────────────────────────────────────────── */
.activity-list { list-style: none; }

.activity-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.activity-item:last-child { border-bottom: none; }

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  margin-top: 6px;
  flex-shrink: 0;
}

.activity-text {
  font-size: 13px;
  color: var(--primary);
  line-height: 1.5;
}

.activity-time {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Filter Bar ────────────────────────────────────────────── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-pill {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--secondary);
  cursor: pointer;
  transition: all var(--transition);
}

.filter-pill:hover { border-color: var(--border-strong); color: var(--primary); }

.filter-pill.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* ── List Items ────────────────────────────────────────────── */
.list-section {
  margin-bottom: 28px;
}

.list-section__title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.list-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  transition: all var(--transition);
  cursor: default;
}

.list-item:hover {
  box-shadow: var(--shadow-card);
  border-color: var(--border-strong);
}

.list-item__dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.list-item__content { flex: 1; min-width: 0; }

.list-item__title {
  font-size: 13px;
  font-weight: 500;
  color: var(--primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.list-item__meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 2px;
}

.list-item__right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.list-item__amount {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  font-variant-numeric: tabular-nums;
}

/* ── Salary Cards ──────────────────────────────────────────── */
.salary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.salary-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-whisper);
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
}

.salary-card:hover {
  box-shadow: var(--shadow-card);
  border-color: var(--border-strong);
}

.salary-card__period {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 4px;
}

.salary-card__date {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}

.salary-card__amount {
  font-size: 22px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.salary-card__label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 2px;
}

.salary-card__row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 12px;
  color: var(--secondary);
}

.salary-card__row span:last-child {
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.salary-card__divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}

.salary-card__expand {
  display: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.salary-card.expanded .salary-card__expand { display: block; }

.salary-card__expand-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  margin-bottom: 8px;
}

/* ── Property List (Profile) ───────────────────────────────── */
.prop-section {
  margin-bottom: 32px;
}

.prop-section__title {
  font-size: 16px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.prop-table {
  width: 100%;
}

.prop-row {
  display: flex;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.prop-row:last-child { border-bottom: none; }

.prop-label {
  width: 180px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  flex-shrink: 0;
}

.prop-value {
  font-size: 13px;
  color: var(--primary);
  flex: 1;
}

/* ── Leave Balance Bars ────────────────────────────────────── */
.balance-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.balance-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-whisper);
}

.balance-item__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.balance-item__type {
  font-size: 13px;
  font-weight: 500;
  color: var(--primary);
}

.balance-item__count {
  font-size: 12px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.balance-bar {
  height: 6px;
  background: var(--bg-page);
  border-radius: 3px;
  overflow: hidden;
}

.balance-bar__fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.balance-item__footer {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
}

/* ── Ticket Priority Dots ──────────────────────────────────── */
.dot-high { background: #dc2626; }
.dot-medium { background: #f59e0b; }
.dot-low { background: #47FA22; }

/* ── Modal ─────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-modal);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(12px);
  transition: transform 0.2s ease;
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal__header {
  padding: 24px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal__title {
  font-size: 18px;
  font-weight: 600;
  color: var(--primary);
}

.modal__close {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  color: var(--muted);
  transition: all var(--transition);
}

.modal__close:hover { background: var(--bg-page); color: var(--primary); }

.modal__body { padding: 20px 24px 24px; }

/* ── Form ──────────────────────────────────────────────────── */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--secondary);
  margin-bottom: 6px;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--primary);
  background: var(--bg);
  outline: none;
  transition: border-color var(--transition);
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-soft);
}

.form-textarea { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ── Upload Zone ──────────────────────────────────────────── */
.upload-zone {
  border: 2px dashed rgba(0,0,0,0.08);
  border-radius: 12px;
  background: #fafafa;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  margin-bottom: 16px;
}
.upload-zone:hover {
  border-color: #47FA22;
  background: rgba(71,250,34,0.03);
}
.upload-zone__icon {
  color: var(--muted);
  margin-bottom: 8px;
}
.upload-zone__text {
  font-size: 13px;
  color: var(--secondary);
  margin-bottom: 4px;
}
.upload-zone__hint {
  font-size: 11px;
  color: var(--muted);
}
.upload-zone input[type="file"] {
  display: none;
}
.file-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}
.file-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--secondary);
}
.file-item__name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  margin-right: 8px;
}
.file-item__remove {
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color var(--transition), background var(--transition);
}
.file-item__remove:hover {
  color: var(--primary);
  background: var(--bg-page);
}

/* ── Expense Line Items ──────────────────────────────────── */
.expense-items {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.expense-item {
  display: grid;
  grid-template-columns: 1fr 140px 120px 32px;
  gap: 8px;
  align-items: center;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.05);
  border-radius: 12px;
  padding: 10px 12px;
}
.expense-item__num {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  position: absolute;
  left: -24px;
  top: 50%;
  transform: translateY(-50%);
}
.expense-item__remove {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  color: var(--muted);
  cursor: pointer;
  transition: color var(--transition), background var(--transition);
  font-size: 16px;
}
.expense-item__remove:hover {
  color: var(--primary);
  background: var(--bg-page);
}
.expense-item__remove:disabled,
.expense-item__remove[disabled] {
  opacity: 0.3;
  cursor: not-allowed;
}
.expense-item__remove:disabled:hover,
.expense-item__remove[disabled]:hover {
  background: none;
  color: var(--muted);
}
.btn-add-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border: 1px solid var(--border-strong);
  border-radius: 9999px;
  font-size: 13px;
  font-weight: 500;
  color: var(--secondary);
  background: none;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 16px;
}
.btn-add-item:hover {
  color: var(--green);
  border-color: var(--green);
}
.expense-total {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
  padding: 12px 0 4px;
  font-size: 13px;
  color: var(--secondary);
}
.expense-total__amount {
  font-size: 1.2rem;
  font-weight: 600;
  color: #47FA22;
}

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
  .sidebar.mobile-open { transform: translateX(0); }
  .main-area { margin-left: 0; }
  .sidebar-toggle { display: flex; }
  .content { padding: 60px 20px 80px; }
  .info-grid { grid-template-columns: 1fr 1fr; }
  .salary-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .info-grid { grid-template-columns: 1fr; }
  .balance-grid { grid-template-columns: 1fr; }
}

/* ── Empty State ───────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}

.empty-state__icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 16px;
  opacity: 0.3;
}

.empty-state__text {
  font-size: 14px;
}

/* ── Animations ────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.content > * {
  animation: fadeIn 0.3s ease forwards;
}

/* ── Tooltip ───────────────────────────────────────────────── */
.status-tooltip {
  position: relative;
}

/* ── Approval Timeline ─────────────────────────────────────── */
.approval-timeline { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.05); }
.approval-title { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
.approval-step { display: flex; gap: 12px; }
.step-indicator { display: flex; flex-direction: column; align-items: center; width: 22px; flex-shrink: 0; }
.step-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid rgba(0,0,0,0.08); color: #999; background: #fff; }
.step-line { width: 2px; flex: 1; min-height: 20px; background: rgba(0,0,0,0.05); }
.step-content { padding-bottom: 16px; }
.step-label { font-size: 13px; font-weight: 500; color: #0d0d0d; }
.step-person { font-size: 12px; color: #999; margin-top: 2px; }
.step-date { font-size: 11px; color: #999; margin-top: 1px; }
.step-done .step-dot { background: #059669; border-color: #059669; color: #fff; }
.step-done .step-line { background: #059669; }
.step-current .step-dot { border-color: #47FA22; color: #3bd416; }
.step-rejected .step-dot { background: #dc2626; border-color: #dc2626; color: #fff; }
.step-waiting .step-dot { background: #fafafa; }
.step-skipped .step-dot { opacity: 0.4; } .step-skipped .step-content { opacity: 0.4; text-decoration: line-through; }

/* ── Expandable list items ────────────────────────────────── */
.list-item--expandable { cursor: pointer; }
.list-item--expandable:hover { background: var(--bg-page); }
.list-item__detail { display: none; padding: 12px 0 4px 18px; border-top: 1px solid var(--border); margin-top: 10px; }

.list-item__detail-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--secondary); margin-bottom: 4px; }

  return map[status] || 'badge-gray';
}

function priorityDot(p) {
  const map = { High: 'dot-high', Medium: 'dot-medium', Low: 'dot-low' };
  return map[p] || '';
}

function leaveColor(type) {
  const lt = LEAVE_TYPES.find(l => l.type === type);
  return lt ? lt.color : '#999';
}

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 18) return 'Good afternoon';
  return 'Good evening';
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */

let currentPage = 'dashboard';

function navigate(page) {
  currentPage = page;
  // Update active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  // Expand parent group
  document.querySelectorAll('.nav-group').forEach(g => {
    const hasActive = g.querySelector(`.nav-item[data-page="${page}"]`);
    if (hasActive) g.classList.remove('collapsed');
  });
  renderPage();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('mobile-open');
  // Scroll top
  window.scrollTo(0, 0);
}

function toggleNavGroup(header) {
  header.parentElement.classList.toggle('collapsed');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

function renderPage() {
  const content = document.getElementById('content');
  const renderers = {
    dashboard: renderDashboard,
    leave: renderLeave,
    salary: renderSalary,
    expenses: renderExpenses,
    tickets: renderTickets,
    profile: renderProfile,
  };
  content.innerHTML = (renderers[currentPage] || renderDashboard)();
  // Attach salary card listeners
  if (currentPage === 'salary') attachSalaryCardListeners();
}

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Focus first input
  setTimeout(() => {
    const first = document.querySelector('.modal .form-input, .modal .form-select, .modal .form-textarea');
    if (first) first.focus();
  }, 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOverlay(e) {
  if (e.target === e.currentTarget) closeModal();
}

// ESC to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function submitLeave() {
  const type = document.getElementById('leaveType').value;
  const from = document.getElementById('leaveFrom').value;
  const to = document.getElementById('leaveTo').value;
  const reason = document.getElementById('leaveReason').value;

  if (!from || !to) { alert('Please select both from and to dates.'); return; }
  if (new Date(to) < new Date(from)) { alert('To date must be after from date.'); return; }

  const diffDays = Math.ceil((new Date(to) - new Date(from)) / (1000 * 60 * 60 * 24)) + 1;
  const newId = 'LV-' + (2400 + LEAVES.length + 1);

  LEAVES.unshift({
    id: newId, type, from, to, days: diffDays,
    status: 'Pending', approver: EMP.manager,
  });

  closeModal();
  navigate('leave');
}

function submitExpense() {
  const title = document.getElementById('expTitle').value;
  const date = document.getElementById('expDate').value;

  if (!title || !date) { alert('Please fill in claim title and date.'); return; }

  // Collect line items
  const items = document.querySelectorAll('#expenseItems .expense-item');
  let totalAmount = 0;
  let valid = true;
  items.forEach(item => {
    const desc = item.querySelector('.exp-item-desc').value;
    const amt = parseFloat(item.querySelector('.exp-item-amount').value) || 0;
    if (!desc || amt <= 0) valid = false;
    totalAmount += amt;
  });

  if (!valid || items.length === 0) { alert('Please fill in all line item fields.'); return; }

  const newId = 'EC-' + (2400 + EXPENSES.length + 1);
  EXPENSES.unshift({
    id: newId, date, category: 'Multiple', description: title,
    amount: totalAmount, status: 'Pending',
  });

  closeModal();
  navigate('expenses');
}

/* ── File Upload Handler ──────────────────────────────────── */
function handleFileSelect(input, listId) {
  const list = document.getElementById(listId);
  Array.from(input.files).forEach(file => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = '<span class="file-item__name">' + file.name + '</span>' +
      '<span class="file-item__remove" onclick="this.parentElement.remove()">&times;</span>';
    list.appendChild(item);
  });
  input.value = '';
}

      categories.map(c => '<option value="' + c + '">' + c + '</option>').join('') +
    '</select>' +
    '<input type="number" class="form-input exp-item-amount" placeholder="0.00" min="0" step="0.01" oninput="updateExpenseTotal()">' +
    '<button type="button" class="expense-item__remove" onclick="removeExpenseItem(this)">&times;</button>';
  container.appendChild(div);
  updateRemoveButtons();
}

function removeExpenseItem(btn) {
  const container = document.getElementById('expenseItems');
  if (container.children.length <= 1) return;
  btn.closest('.expense-item').remove();
  updateRemoveButtons();
  updateExpenseTotal();
}

function updateRemoveButtons() {
  const container = document.getElementById('expenseItems');
  const btns = container.querySelectorAll('.expense-item__remove');
  btns.forEach(b => {
    b.disabled = container.children.length <= 1;
  });
}

function updateExpenseTotal() {
  let total = 0;
  document.querySelectorAll('#expenseItems .exp-item-amount').forEach(input => {
    total += parseFloat(input.value) || 0;
  });
  const el = document.getElementById('expTotal');
  if (el) el.textContent = '\u00A5' + total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderTickets() {
  // Sort by priority: High > Medium > Low
  const priorityOrder = { High: 0, Medium: 1, Low: 2 };
  const sorted = [...TICKETS].sort((a, b) => (priorityOrder[a.priority] || 9) - (priorityOrder[b.priority] || 9));

  const statusFilter = ['All', 'Open', 'Pending', 'Closed'];

  return `
    <div class="breadcrumb">
      <a href="#" onclick="navigate('dashboard'); return false;">Home</a>
      <span class="breadcrumb__sep">/</span>
      <span class="breadcrumb__current">Tickets</span>
    </div>

    <div class="page-header">
      <div class="page-header__title">Support Tickets</div>
      <div class="page-header__desc">Submit questions, report issues, and track resolution.</div>
      <div class="page-header__actions">
        <button class="btn btn-primary" onclick="openTicketForm()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New Ticket
        </button>
      </div>
    </div>

    <div class="filter-bar" id="ticketFilter">
      ${statusFilter.map((s, i) => `
        <button class="filter-pill${i === 0 ? ' active' : ''}" onclick="filterTickets('${s}', this)">${s}</button>
      `).join('')}
    </div>

    <div id="ticketList">
      ${renderTicketList('All', sorted)}
    </div>
  `;
}

function renderTicketList(filter, tickets) {
  const priorityOrder = { High: 0, Medium: 1, Low: 2 };
  if (!tickets) {
    tickets = [...TICKETS].sort((a, b) => (priorityOrder[a.priority] || 9) - (priorityOrder[b.priority] || 9));
  }
  const list = filter === 'All' ? tickets : tickets.filter(t => t.status === filter);
  if (list.length === 0) {
    return `<div class="empty-state"><div class="empty-state__text">No tickets found.</div></div>`;
  }
  return list.map(t => `
    <div class="list-item">
      <div class="list-item__dot ${priorityDot(t.priority)}"></div>
      <div class="list-item__content">
        <div class="list-item__title">${t.subject}</div>
        <div class="list-item__meta">
          <span>${t.id}</span>
          <span>${t.category}</span>
          <span>${t.priority}</span>
          <span>Updated ${t.updated}</span>
        </div>
      </div>
      <div class="list-item__right">
        <span class="badge ${badgeClass(t.status)}">${t.status}</span>
      </div>
    </div>
  `).join('');
}

function filterTickets(status, btn) {
  document.querySelectorAll('#ticketFilter .filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ticketList').innerHTML = renderTicketList(status);
}

function openTicketForm() {
  const categories = ['IT Support', 'HR', 'Facilities', 'Finance', 'Other'];
  const priorities = ['Low', 'Medium', 'High'];
  openModal(`
    <div class="modal__header">
      <span class="modal__title">New Support Ticket</span>
      <button class="modal__close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <div class="form-group">
        <label class="form-label">Subject</label>
        <input type="text" class="form-input" id="tkSubject" placeholder="Brief description of your issue">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="tkCategory">
            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="tkPriority">
            ${priorities.map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="tkDesc" placeholder="Please describe your issue in detail..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Attachments</label>
        <div class="upload-zone" onclick="document.getElementById('tkFiles').click()" id="tkUploadZone">
          <div class="upload-zone__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <div class="upload-zone__text">Click to select or drag files here</div>
          <div class="upload-zone__hint">PDF, JPG, PNG up to 10MB</div>
          <input type="file" id="tkFiles" multiple accept=".pdf,.jpg,.jpeg,.png" onchange="handleFileSelect(this, 'tkFileList')">
        </div>
        <div class="file-list" id="tkFileList"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitTicket()">Submit Ticket</button>
      </div>
    </div>
  `);
}

function submitTicket() {
  const subject = document.getElementById('tkSubject').value;
  const category = document.getElementById('tkCategory').value;
  const priority = document.getElementById('tkPriority').value;
  const desc = document.getElementById('tkDesc').value;

  if (!subject) { alert('Please enter a subject.'); return; }

  const today = new Date().toISOString().split('T')[0];
  const newId = 'TK-' + String(90 + TICKETS.length).padStart(4, '0');

  TICKETS.unshift({
    id: newId, subject, category, priority,
    status: 'Open', created: today, updated: today,
  });

  closeModal();
  navigate('tickets');
}

/* ═══════════════════════════════════════════════════════════════
   APPROVAL WORKFLOW TIMELINE
   ═══════════════════════════════════════════════════════════════ */

function getApprovalSteps(status, approver, date) {
  const steps = [
    { label: 'Submitted', person: 'Zhang Rui', date: date, status: 'done' },
    { label: 'Manager Review', person: approver || 'Li Wei', date: '', status: 'pending' },
    { label: 'HR Approval', person: 'HR Department', date: '', status: 'waiting' },
    { label: 'Completed', person: '', date: '', status: 'waiting' }
  ];
  if (status === 'Approved') { steps[1].status='done'; steps[1].date=date; steps[2].status='done'; steps[2].date=date; steps[3].status='done'; steps[3].date=date; }
  else if (status === 'Pending') { steps[1].status='current'; }
  else if (status === 'Rejected') { steps[1].status='rejected'; steps[1].date=date; steps[2].status='skipped'; steps[3].status='skipped'; }
  else if (status === 'Draft') { steps[0].status='current'; steps[1].status='waiting'; }
  return steps;
}
function renderApprovalTimeline(status, approver, date) {
  const steps = getApprovalSteps(status, approver, date);
  return `<div class="approval-timeline"><div class="approval-title">Approval Workflow</div><div class="approval-steps">${steps.map((s,i)=>`<div class="approval-step step-${s.status}"><div class="step-indicator"><div class="step-dot">${s.status==='done'?'✓':s.status==='rejected'?'✕':s.status==='current'?'●':''}</div>${i<steps.length-1?'<div class="step-line"></div>':''}</div><div class="step-content"><div class="step-label">${s.label}</div>${s.person?`<div class="step-person">${s.person}</div>`:''}${s.date?`<div class="step-date">${s.date}</div>`:''}</div></div>`).join('')}</div></div>`;
}
