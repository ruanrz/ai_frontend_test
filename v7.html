<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RampingUp — Employee Portal (Feed)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    a { color: inherit; text-decoration: none; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; }
    input, select { font-family: inherit; font-size: inherit; }

    /* ── App Shell ────────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      background: #ffffff;
      box-shadow: 0 0 60px rgba(0,0,0,0.06);
    }

    /* ── Top Bar ──────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .topbar__title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .topbar__actions { display: flex; gap: 8px; align-items: center; }
    .topbar__btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
      position: relative;
      transition: background 0.15s;
    }
    .topbar__btn:active { background: #f0f0f0; }
    .topbar__btn svg { width: 22px; height: 22px; }
    .topbar__badge {
      position: absolute; top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: #ef4444;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* ── Pull to Refresh ──────────────────────────────────── */
    .pull-hint {
      text-align: center;
      padding: 0;
      height: 0;
      overflow: hidden;
      transition: height 0.3s, padding 0.3s;
      color: #999;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .pull-hint.visible {
      height: 48px;
      padding: 12px 0;
    }
    .pull-hint svg {
      width: 16px; height: 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Content Area ─────────────────────────────────────── */
    .content-area {
      padding: 0 16px 100px 16px;
      min-height: calc(100dvh - 56px);
    }

    /* ── Page Transitions ─────────────────────────────────── */
    .page { display: none; }
    .page.active {
      display: block;
      animation: pageIn 0.3s ease-out;
    }
    .page.slide-left {
      animation: slideLeft 0.3s ease-out;
    }
    .page.slide-right {
      animation: slideRight 0.3s ease-out;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ── Cards ────────────────────────────────────────────── */
    .card {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card--white {
      background: #ffffff;
      border: 1px solid #f0f0f0;
    }
    .card__title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* ── Section Label ────────────────────────────────────── */
    .section-label {
      font-size: 17px;
      font-weight: 700;
      padding: 20px 0 12px;
      letter-spacing: -0.2px;
    }

    /* ── Status Badges ────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .badge--approved { background: #dcfce7; color: #166534; }
    .badge--pending { background: #fef3c7; color: #92400e; }
    .badge--rejected { background: #fce4ec; color: #b71c1c; }
    .badge--draft { background: #f3f4f6; color: #6b7280; }
    .badge--open { background: #dbeafe; color: #1e40af; }
    .badge--closed { background: #e8e8e8; color: #666; }
    .badge--submitted { background: #e0f2fe; color: #0369a1; }

    /* ── Priority Dots ────────────────────────────────────── */
    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .priority-dot--high { background: #ef4444; }
    .priority-dot--medium { background: #f59e0b; }
    .priority-dot--low { background: #22c55e; }

    /* ── Bottom Tab Bar ───────────────────────────────────── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 64px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-width: 56px;
      min-height: 44px;
      padding: 4px 0;
      position: relative;
      color: #aaa;
      transition: color 0.2s;
    }
    .tab-item.active { color: #1a1a1a; }
    .tab-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: #22c55e;
      border-radius: 0 0 3px 3px;
    }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-item__label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── FAB ──────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 84px;
      right: calc(50% - 240px + 20px);
      width: 56px; height: 56px;
      background: #22c55e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(34,197,94,0.4);
      z-index: 150;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fabPulse 3s ease-in-out infinite;
    }
    .fab:active { transform: scale(0.92); }
    .fab.open {
      transform: rotate(45deg);
      animation: none;
      box-shadow: 0 4px 24px rgba(34,197,94,0.5);
    }
    .fab svg { width: 24px; height: 24px; stroke: #fff; stroke-width: 2.5; }
    @keyframes fabPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(34,197,94,0.4); }
      50% { box-shadow: 0 4px 32px rgba(34,197,94,0.6); }
    }
    @media (max-width: 520px) {
      .fab { right: 20px; }
    }

    /* ── FAB Menu ─────────────────────────────────────────── */
    .fab-menu {
      position: fixed;
      bottom: 152px;
      right: calc(50% - 240px + 16px);
      z-index: 149;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .fab-menu.open {
      pointer-events: auto;
      opacity: 1;
    }
    @media (max-width: 520px) {
      .fab-menu { right: 16px; }
    }
    .fab-menu__item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.25s ease-out, opacity 0.2s;
    }
    .fab-menu.open .fab-menu__item {
      transform: translateY(0);
      opacity: 1;
    }
    .fab-menu.open .fab-menu__item:nth-child(1) { transition-delay: 0.05s; }
    .fab-menu.open .fab-menu__item:nth-child(2) { transition-delay: 0.1s; }
    .fab-menu.open .fab-menu__item:nth-child(3) { transition-delay: 0.15s; }
    .fab-menu__item:active { background: #f5f5f5; }
    .fab-menu__icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .fab-menu__icon svg { width: 16px; height: 16px; }
    .fab-menu__icon--leave { background: #dcfce7; color: #166534; }
    .fab-menu__icon--expense { background: #fef3c7; color: #92400e; }
    .fab-menu__icon--ticket { background: #dbeafe; color: #1e40af; }

    /* FAB backdrop overlay */
    .fab-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 148;
    }
    .fab-overlay.open { display: block; }

    /* ── HOME PAGE ────────────────────────────────────────── */

    /* Greeting */
    .greeting {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 0 8px;
    }
    .greeting__avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .greeting__text { flex: 1; }
    .greeting__hello {
      font-size: 14px;
      color: #888;
      font-weight: 500;
    }
    .greeting__name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    /* Leave Balance Pills */
    .balance-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .balance-scroll::-webkit-scrollbar { display: none; }
    .balance-pill {
      flex-shrink: 0;
      background: #f5f5f5;
      border-radius: 14px;
      padding: 14px 18px;
      min-width: 140px;
    }
    .balance-pill__type {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
    }
    .balance-pill__numbers {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .balance-pill__remaining {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      font-family: 'JetBrains Mono', monospace;
    }
    .balance-pill__total {
      font-size: 13px;
      color: #aaa;
      font-family: 'JetBrains Mono', monospace;
    }
    .balance-pill__bar {
      height: 4px;
      background: #e5e5e5;
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }
    .balance-pill__bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease-out;
    }

    /* Pending Actions */
    .action-card {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .action-card__icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .action-card__icon--leave { background: #dcfce7; color: #166534; }
    .action-card__icon--expense { background: #fef3c7; color: #92400e; }
    .action-card__icon--ticket { background: #fee2e2; color: #991b1b; }
    .action-card__icon svg { width: 18px; height: 18px; }
    .action-card__body { flex: 1; min-width: 0; }
    .action-card__title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .action-card__sub {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .action-card__badge { flex-shrink: 0; }

    /* Activity Timeline */
    .timeline { padding: 4px 0 0 0; }
    .timeline__item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .timeline__item:last-child { border-bottom: none; }
    .timeline__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #d4d4d4;
      flex-shrink: 0;
      margin-top: 7px;
    }
    .timeline__content { flex: 1; }
    .timeline__text {
      font-size: 14px;
      color: #333;
      line-height: 1.45;
    }
    .timeline__time {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    /* Salary Summary Card */
    .salary-hero {
      text-align: center;
      padding: 8px 0;
    }
    .salary-hero__label {
      font-size: 13px;
      color: #888;
      font-weight: 500;
    }
    .salary-hero__amount {
      font-size: 36px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -2px;
      margin: 4px 0;
    }
    .salary-hero__sub {
      font-size: 12px;
      color: #aaa;
    }
    .salary-hero__row {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e5e5;
    }
    .salary-hero__col { text-align: center; flex: 1; }
    .salary-hero__col-label { font-size: 12px; color: #999; }
    .salary-hero__col-value {
      font-size: 16px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    /* ── LEAVE PAGE ───────────────────────────────────────── */
    .filter-pills {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-pills::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      background: #f5f5f5;
      color: #888;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .filter-pill.active {
      background: #1a1a1a;
      color: #fff;
    }
    .filter-pill:active { transform: scale(0.96); }

    .leave-card {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
    }
    .leave-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .leave-card__type {
      font-size: 15px;
      font-weight: 700;
    }
    .leave-card__dates {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }
    .leave-card__footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
    .leave-card__days {
      font-size: 14px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .leave-card__approver {
      font-size: 12px;
      color: #aaa;
    }

    /* ── MONEY PAGE ───────────────────────────────────────── */
    .money-tabs {
      display: flex;
      background: #f5f5f5;
      border-radius: 14px;
      padding: 4px;
      margin: 12px 0;
    }
    .money-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      border-radius: 11px;
      color: #888;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 44px;
    }
    .money-tab.active {
      background: #ffffff;
      color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .money-tab:active { transform: scale(0.97); }

    .money-section { display: none; }
    .money-section.active { display: block; }

    /* Salary cards */
    .salary-card {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .salary-card__month {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .salary-card__month-label {
      font-size: 10px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
    }
    .salary-card__month-year {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
    }
    .salary-card__body { flex: 1; min-width: 0; }
    .salary-card__period {
      font-size: 14px;
      font-weight: 600;
    }
    .salary-card__date {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .salary-card__net {
      text-align: right;
      flex-shrink: 0;
    }
    .salary-card__net-amount {
      font-size: 18px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.5px;
    }
    .salary-card__net-label {
      font-size: 11px;
      color: #aaa;
    }

    /* Expense cards */
    .expense-card {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
    }
    .expense-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .expense-card__desc {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      margin-right: 12px;
    }
    .expense-card__amount {
      font-size: 16px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .expense-card__footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .expense-card__meta {
      font-size: 12px;
      color: #999;
    }
    .expense-card__category {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      background: #e8e8e8;
      padding: 2px 8px;
      border-radius: 6px;
    }

    /* Wallet */
    .wallet-hero {
      text-align: center;
      padding: 24px 0 16px;
    }
    .wallet-hero__label {
      font-size: 13px;
      color: #888;
      font-weight: 500;
    }
    .wallet-hero__amount {
      font-size: 42px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -2px;
      margin: 8px 0;
    }
    .wallet-hero__sub {
      font-size: 12px;
      color: #22c55e;
      font-weight: 600;
    }
    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-item__icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    .tx-item__icon--in { background: #dcfce7; }
    .tx-item__icon--out { background: #fef3c7; }
    .tx-item__body { flex: 1; min-width: 0; }
    .tx-item__title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-item__date {
      font-size: 12px;
      color: #aaa;
      margin-top: 1px;
    }
    .tx-item__amount {
      font-size: 15px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .tx-item__amount--in { color: #22c55e; }
    .tx-item__amount--out { color: #1a1a1a; }

    /* ── TICKETS PAGE ─────────────────────────────────────── */
    .ticket-card {
      background: #f5f5f5;

    .af-step { display:flex; gap:12px; position:relative; padding-bottom:18px; }
    .af-step:last-child { padding-bottom:0; }

  // ── Routing ────────────────────────────────────────────

  function navigate(tab, direction) {
    if (tab === currentTab) return;

    const prevIdx = TAB_ORDER.indexOf(currentTab);
    const nextIdx = TAB_ORDER.indexOf(tab);
    const dir = direction || (nextIdx > prevIdx ? 'left' : 'right');

    // Hide current
    const prevPage = document.getElementById('page-' + currentTab);
    if (prevPage) {
      prevPage.classList.remove('active', 'slide-left', 'slide-right');
    }

    currentTab = tab;

    // Render content
    const pageEl = document.getElementById('page-' + tab);
    const renderers = { home: renderHome, leave: renderLeave, money: renderMoney, tickets: renderTickets, me: renderMe };
    pageEl.innerHTML = renderers[tab]();

    // Show with animation
    pageEl.classList.add('active', dir === 'left' ? 'slide-left' : 'slide-right');

    // Update topbar title
    document.getElementById('pageTitle').textContent = TAB_TITLES[tab];

    // Update tab bar
    document.querySelectorAll('.tab-item').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });

    // Bind page-specific events
    if (tab === 'leave') bindLeaveFilters();
    if (tab === 'money') bindMoneyTabs();
    if (tab === 'me') bindProfileSections();

    // Close FAB if open
    closeFab();
  }

  // ── Event Bindings ─────────────────────────────────────

  function bindLeaveFilters() {
    const container = document.getElementById('leaveFilters');
    if (!container) return;
    container.addEventListener('click', (e) => {
      const pill = e.target.closest('.filter-pill');
      if (!pill) return;
      container.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.getElementById('leaveCards').innerHTML = renderLeaveCards(pill.dataset.filter);
    });
  }

  function bindMoneyTabs() {
    const container = document.getElementById('moneyTabs');
    if (!container) return;
    container.addEventListener('click', (e) => {
      const tab = e.target.closest('.money-tab');
      if (!tab) return;
      const subtab = tab.dataset.subtab;
      moneySubTab = subtab;
      container.querySelectorAll('.money-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.money-section').forEach(s => s.classList.remove('active'));
      document.getElementById('money' + subtab.charAt(0).toUpperCase() + subtab.slice(1)).classList.add('active');
    });
  }

  function bindProfileSections() {
    document.querySelectorAll('.profile-section__header').forEach(header => {
      header.addEventListener('click', () => {
        const section = header.parentElement;
        section.classList.toggle('open');
      });
    });
  }

  // ── Approval Flow ─────────────────────────────────────
  function approvalSteps(status, approver, date) {
    const s = status.toLowerCase ? status.toLowerCase() : status;
    if (s === 'draft') return [
      {l:'Draft Created',m:date,st:'done',i:'✎'},
      {l:'Submit for Review',m:'Not yet submitted',st:'waiting',i:'→'},
      {l:'Manager Review',p:approver,st:'waiting',i:'○'},
      {l:'Completed',st:'waiting',i:'✓'}
    ];
    if (s === 'pending') return [
      {l:'Submitted',m:date,st:'done',i:'✓'},
      {l:'Manager Review',p:approver||'Li Wei',m:'Awaiting approval',st:'current',i:'◷'},
      {l:'HR Confirmation',st:'waiting',i:'○'},
      {l:'Completed',st:'waiting',i:'✓'}
    ];
    if (s === 'approved') return [
      {l:'Submitted',m:date,st:'done',i:'✓'},
      {l:'Manager Approved',p:approver||'Li Wei',m:'Approved',st:'done',i:'✓'},
      {l:'HR Confirmed',m:'Confirmed',st:'done',i:'✓'},
      {l:'Completed',m:'All approvals received',st:'done',i:'✓'}
    ];
    if (s === 'rejected') return [
      {l:'Submitted',m:date,st:'done',i:'✓'},
      {l:'Manager Rejected',p:approver||'Li Wei',m:'Request rejected',st:'rejected',i:'✕'},
      {l:'HR Confirmation',m:'Skipped',st:'waiting',i:'○'},
      {l:'Completed',st:'waiting',i:'✓'}
    ];
    return [{l:status,st:'done',i:'✓'}];
  }

  function approvalHTML(status, approver, date) {
    const steps = approvalSteps(status, approver, date);
    return `<div class="af-flow"><div class="af-title">Approval Progress</div><div class="af-steps">${steps.map(s=>`<div class="af-step ${s.st}"><div class="af-dot">${s.i}</div><div class="af-content"><div class="af-label">${s.l}</div>${s.p?`<div class="af-person">${s.p}</div>`:''}${s.m?`<div class="af-meta">${s.m}</div>`:''}</div></div>`).join('')}</div></div>`;
  }

    const e = EXPENSES[idx];
    openSheet(`<div class="sheet-header"><h3>Expense — ${e.id}</h3><button class="sheet-close" onclick="closeSheet()">✕</button></div><div class="sheet-body"><div style="margin-bottom:14px"><div class="dm-row"><span class="dm-row-label">Description</span><span class="dm-row-value">${e.description}</span></div><div class="dm-row"><span class="dm-row-label">Category</span><span class="dm-row-value">${e.category}</span></div><div class="dm-row"><span class="dm-row-label">Amount</span><span class="dm-row-value">${fmt(e.amount)}</span></div><div class="dm-row"><span class="dm-row-label">Date</span><span class="dm-row-value">${shortDate(e.date)}</span></div><div class="dm-row"><span class="dm-row-label">Status</span><span class="dm-row-value"><span class="badge badge--${statusCls(e.status)}">${e.status}</span></span></div></div>${approvalHTML(e.status, 'Li Wei', e.date)}</div><div class="sheet-footer"><button class="btn-ghost btn" onclick="closeSheet()">Close</button></div>`);
  }

  // ── Bottom Sheet ────────────────────────────────────────
  function openSheet(html) { closeSheet(); const o=document.createElement('div'); o.className='sheet-overlay'; o.id='sheetOverlay'; o.onclick=function(e){if(e.target===o)closeSheet()}; document.body.appendChild(o); const s=document.createElement('div'); s.className='sheet'; s.id='appSheet'; s.innerHTML='<div class="sheet-handle"></div>'+html; document.body.appendChild(s); }
  function closeSheet() { document.getElementById('sheetOverlay')?.remove(); document.getElementById('appSheet')?.remove(); }

  function openLeaveForm() {
    openSheet(`<div class="sheet-header"><h3>Apply for Leave</h3><button class="sheet-close" onclick="closeSheet()">✕</button></div><div class="sheet-body"><div class="s-form-group"><label class="s-form-label">Leave Type</label><select class="s-form-select"><option>Annual Leave</option><option>Sick Leave</option><option>Personal Leave</option><option>Compensatory</option></select></div><div class="s-form-row"><div class="s-form-group"><label class="s-form-label">From</label><input class="s-form-input" type="date"></div><div class="s-form-group"><label class="s-form-label">To</label><input class="s-form-input" type="date"></div></div><div class="s-form-group"><label class="s-form-label">Half Day</label><select class="s-form-select"><option>No</option><option>Forenoon</option><option>Afternoon</option></select></div><div class="s-form-group"><label class="s-form-label">Reason</label><textarea class="s-form-textarea" placeholder="Why do you need leave?"></textarea></div><div class="s-form-group"><label class="s-form-label">Attachment</label><div class="s-upload">Tap to upload (JPG, PNG, PDF)</div></div></div><div class="sheet-footer"><button class="btn-ghost btn" onclick="closeSheet()">Cancel</button><button class="btn-primary btn" onclick="closeSheet()">Submit</button></div>`);
  }

  let sExpItems=1;
  function sExpItemsHTML(n){let h='';for(let i=1;i<=n;i++)h+=`<div class="s-expense-item"><div class="s-expense-head"><span class="s-expense-num">Item #${i}</span>${i>1?'<button class="s-expense-rm" onclick="this.closest(\'.s-expense-item\').remove();sExpItems--">✕</button>':''}</div><div class="s-form-row"><div class="s-form-group" style="margin:0"><label class="s-form-label">Date</label><input class="s-form-input" type="date"></div><div class="s-form-group" style="margin:0"><label class="s-form-label">Amount</label><input class="s-form-input" type="number" placeholder="0.00"></div></div><div class="s-form-row" style="margin-top:8px"><div class="s-form-group" style="margin:0"><label class="s-form-label">Category</label><select class="s-form-select"><option>Travel</option><option>Meals</option><option>Equipment</option><option>Transport</option><option>Other</option></select></div><div class="s-form-group" style="margin:0"><label class="s-form-label">Currency</label><select class="s-form-select"><option>CNY</option><option>USD</option><option>EUR</option></select></div></div></div>`;return h}
  function openExpenseForm(){sExpItems=1;openSheet(`<div class="sheet-header"><h3>Submit Expense</h3><button class="sheet-close" onclick="closeSheet()">✕</button></div><div class="sheet-body"><div id="sExpWrap">${sExpItemsHTML(1)}</div><button class="s-add-btn" onclick="sExpItems++;document.getElementById('sExpWrap').innerHTML=sExpItemsHTML(sExpItems)">+ Add Item</button><div class="s-form-group" style="margin-top:12px"><label class="s-form-label">Receipts</label><div class="s-upload">Tap to upload receipts</div></div></div><div class="sheet-footer"><button class="btn-ghost btn" onclick="closeSheet()">Cancel</button><button class="btn-primary btn" onclick="closeSheet()">Submit</button></div>`)}

  function openTicketForm(){openSheet(`<div class="sheet-header"><h3>Create Ticket</h3><button class="sheet-close" onclick="closeSheet()">✕</button></div><div class="sheet-body"><div class="s-form-group"><label class="s-form-label">Category</label><select class="s-form-select"><option>IT Support</option><option>HR</option><option>Facilities</option><option>Finance</option></select></div><div class="s-form-group"><label class="s-form-label">Priority</label><select class="s-form-select"><option>Low</option><option>Medium</option><option>High</option></select></div><div class="s-form-group"><label class="s-form-label">Subject</label><input class="s-form-input" placeholder="Brief summary"></div><div class="s-form-group"><label class="s-form-label">Description</label><textarea class="s-form-textarea" placeholder="Describe the issue..."></textarea></div><div class="s-form-group"><label class="s-form-label">Attachments</label><div class="s-upload">Tap to upload</div></div></div><div class="sheet-footer"><button class="btn-ghost btn" onclick="closeSheet()">Cancel</button><button class="btn-primary btn" onclick="closeSheet()">Create</button></div>`)}

  function openEditProfile(){openSheet(`<div class="sheet-header"><h3>Edit Profile</h3><button class="sheet-close" onclick="closeSheet()">✕</button></div><div class="sheet-body"><div class="s-form-group"><label class="s-form-label">Full Name</label><input class="s-form-input" value="Zhang Rui"></div><div class="s-form-group"><label class="s-form-label">Email</label><input class="s-form-input" value="zhang.rui@rampingup.com"></div><div class="s-form-group"><label class="s-form-label">Phone</label><input class="s-form-input" value="+86 138 8888 0032"></div><div class="s-form-group"><label class="s-form-label">Address</label><input class="s-form-input" placeholder="Current address"></div></div><div class="sheet-footer"><button class="btn-ghost btn" onclick="closeSheet()">Cancel</button><button class="btn-primary btn" onclick="closeSheet()">Save</button></div>`)}

  // ── FAB ────────────────────────────────────────────────
  const fab = document.getElementById('fab');
  const fabMenu = document.getElementById('fabMenu');
  const fabOverlay = document.getElementById('fabOverlay');

  function toggleFab() {
    const open = fab.classList.toggle('open');
    fabMenu.classList.toggle('open', open);
    fabOverlay.classList.toggle('open', open);
  }

  function closeFab() {
    fab.classList.remove('open');
    fabMenu.classList.remove('open');
    fabOverlay.classList.remove('open');
  }

  fab.addEventListener('click', toggleFab);
  fabOverlay.addEventListener('click', closeFab);

  fabMenu.addEventListener('click', (e) => {
    const item = e.target.closest('.fab-menu__item');
    if (!item) return;
    const action = item.dataset.action;
    closeFab();
    if (action === 'leave') openLeaveForm();
    else if (action === 'expense') openExpenseForm();
    else if (action === 'ticket') openTicketForm();
  });

  // ── Pull to Refresh ────────────────────────────────────
  let touchStartY = 0;
  let pulling = false;
  const pullHint = document.getElementById('pullHint');
  const contentArea = document.getElementById('contentArea');

  contentArea.addEventListener('touchstart', (e) => {
    if (contentArea.scrollTop <= 0) {
      touchStartY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  contentArea.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const diff = e.touches[0].clientY - touchStartY;
    if (diff > 60 && contentArea.scrollTop <= 0) {
      pullHint.classList.add('visible');
    }
  }, { passive: true });

  contentArea.addEventListener('touchend', () => {
    if (pullHint.classList.contains('visible')) {
      setTimeout(() => {
        pullHint.classList.remove('visible');
        // Re-render current page
        const pageEl = document.getElementById('page-' + currentTab);
        const renderers = { home: renderHome, leave: renderLeave, money: renderMoney, tickets: renderTickets, me: renderMe };
        pageEl.innerHTML = renderers[currentTab]();
        if (currentTab === 'leave') bindLeaveFilters();
        if (currentTab === 'money') bindMoneyTabs();
        if (currentTab === 'me') bindProfileSections();
      }, 800);
    }
    pulling = false;
  });

  // ── Hash Routing ───────────────────────────────────────
  function handleHash() {
    const hash = location.hash.replace('#/', '') || 'home';
    const tab = TAB_ORDER.includes(hash) ? hash : 'home';
    navigate(tab);
  }

  window.addEventListener('hashchange', handleHash);

  // ── Tab Bar click ──────────────────────────────────────
  document.querySelectorAll('.tab-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      const tab = item.dataset.tab;
      location.hash = '#/' + tab;
    });
  });

  // ── Init ───────────────────────────────────────────────
  (function init() {
    // Render home immediately
    const hash = location.hash.replace('#/', '') || 'home';
    const tab = TAB_ORDER.includes(hash) ? hash : 'home';
    currentTab = tab;
    const pageEl = document.getElementById('page-' + tab);
    const renderers = { home: renderHome, leave: renderLeave, money: renderMoney, tickets: renderTickets, me: renderMe };
    pageEl.innerHTML = renderers[tab]();
    pageEl.classList.add('active');
    document.getElementById('pageTitle').textContent = TAB_TITLES[tab];
    document.querySelectorAll('.tab-item').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    if (tab === 'leave') bindLeaveFilters();
    if (tab === 'money') bindMoneyTabs();
    if (tab === 'me') bindProfileSections();
  })();
  </script>
</body>
</html>
